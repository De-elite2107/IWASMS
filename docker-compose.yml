version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: iwasms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iwasms
      POSTGRES_USER: iwasms
      POSTGRES_PASSWORD: iwasms_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - iwasms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwasms -d iwasms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iwasms_redis
    restart: unless-stopped
    networks:
      - iwasms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iwasms_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 iwasms.asgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=iwasms.settings.development
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - POSTGRES_DB=iwasms
      - POSTGRES_USER=iwasms
      - POSTGRES_PASSWORD=iwasms_secret
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - model_weights:/app/ml_engine/models
    networks:
      - iwasms_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iwasms_celery
    restart: unless-stopped
    command: celery -A iwasms worker -l info -c 4
    environment:
      - DJANGO_SETTINGS_MODULE=iwasms.settings.development
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - POSTGRES_DB=iwasms
      - POSTGRES_USER=iwasms
      - POSTGRES_PASSWORD=iwasms_secret
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - model_weights:/app/ml_engine/models
    networks:
      - iwasms_network
    depends_on:
      - django
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iwasms_celery_beat
    restart: unless-stopped
    command: celery -A iwasms beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=iwasms.settings.development
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me-in-production}
      - POSTGRES_DB=iwasms
      - POSTGRES_USER=iwasms
      - POSTGRES_PASSWORD=iwasms_secret
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - model_weights:/app/ml_engine/models
    networks:
      - iwasms_network
    depends_on:
      - django
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iwasms_frontend
    restart: unless-stopped
    networks:
      - iwasms_network
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: iwasms_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - iwasms_network
    depends_on:
      - django
      - frontend

volumes:
  pg_data:
  model_weights:

networks:
  iwasms_network:
    driver: bridge
